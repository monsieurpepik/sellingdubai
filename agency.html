  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: "Inter", sans-serif; min-height: 100vh; }
    .container { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.4); font-size: 13px; text-decoration: none; margin-bottom: 32px; transition: color 0.15s; }
    .back-link:hover { color: rgba(255,255,255,0.7); }
    .skeleton-block { background: rgba(255,255,255,0.06); border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #agency-header { display: none; margin-bottom: 40px; }
    .agency-top { display: flex; align-items: flex-start; gap: 20px; }
    .agency-logo { width: 72px; height: 72px; border-radius: 16px; background: rgba(255,255,255,0.08); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; font-family: "Manrope", sans-serif; overflow: hidden; }
    .agency-name { font-family: "Manrope", sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 6px; line-height: 1.15; }
    #agency-description { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 8px; line-height: 1.6; display: none; }
    #agency-website { display: none; align-items: center; gap: 4px; font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; text-decoration: none; }
    #agency-website:hover { color: rgba(255,255,255,0.8); }
    #agents-section { display: none; }
    .agents-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
    .agents-title { font-family: "Manrope", sans-serif; font-size: 18px; font-weight: 700; }
    #agents-count { font-size: 13px; color: rgba(255,255,255,0.4); }
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .agent-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 20px 16px; text-decoration: none; color: inherit; transition: background 0.15s, border-color 0.15s; display: block; }
    .agent-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
    .agent-avatar { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.1); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 18px; font-weight: 700; }
    .agent-name { font-weight: 700; font-size: 15px; text-align: center; margin-bottom: 4px; }
    .agent-tagline { font-size: 12px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 6px; }
    .agent-brn { font-size: 11px; color: rgba(255,255,255,0.35); text-align: center; }
    .agent-wa { font-size: 11px; color: #25d366; text-align: center; margin-top: 4px; }
    #error-state { display: none; color: rgba(255,255,255,0.5); font-size: 15px; padding: 60px 0; text-align: center; }
    #error-state p { margin: 8px 0 0; font-size: 13px; color: rgba(255,255,255,0.35); }
    .page-footer { margin-top: 60px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.06); text-align: center; }
    .page-footer img { height: 24px; filter: invert(1); opacity: 0.5; }
    .skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:9999;background:#000;color:#fff;padding:8px 16px;font-size:14px;text-decoration:none;border-radius:4px;}.skip-link:focus{left:50%;transform:translateX(-50%);top:8px;width:auto;height:auto;overflow:visible;}

<a href="#main-content" class="skip-link">Skip to main content</a>
  <main class="container" id="main-content">
    <a href="/" class="back-link">← Back to SellingDubai</a>

    <div id="skeleton">
      <div style="display:flex;gap:16px;margin-bottom:32px;">
        <div class="skeleton-block" style="width:72px;height:72px;border-radius:16px;flex-shrink:0;"></div>
        <div style="flex:1;">
          <div class="skeleton-block" style="height:28px;width:60%;margin-bottom:8px;"></div>
          <div class="skeleton-block" style="height:14px;width:80%;margin-bottom:6px;"></div>
          <div class="skeleton-block" style="height:14px;width:50%;"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        <div class="skeleton-block" style="height:160px;border-radius:14px;"></div>
        <div class="skeleton-block" style="height:160px;border-radius:14px;"></div>
        <div class="skeleton-block" style="height:160px;border-radius:14px;"></div>
      </div>
    </div>

    <div id="agency-header">
      <div class="agency-top">
        <div class="agency-logo" id="agency-logo"></div>
        <div>
          <div class="agency-name" id="agency-name"></div>
          <div id="agency-description"></div>
          <a id="agency-website" href="#" target="_blank" rel="noopener">🌐 <span></span></a>
        </div>
      </div>
    </div>

    <div id="agents-section">
      <div class="agents-header">
        <div class="agents-title">Our Agents</div>
        <div id="agents-count"></div>
      </div>
      <div class="agents-grid" id="agents-grid"></div>
    </div>

    <div id="error-state"><div style="font-size:32px;margin-bottom:12px;">🏢</div><strong>Agency not found</strong><p>This agency page doesn't exist or may have been removed. <a href="/" style="color:rgba(255,255,255,0.6);text-decoration:underline;">Back to SellingDubai</a></p></div>

    <div class="page-footer">
      <a href="/"><img src="/sellingdubailogo.png" alt="SellingDubai" width="300" height="67"></a>
    </div>
