<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<header>
  <div class="container">
    <a href="/" class="logo">SellingDubai</a>
    <a href="/join" class="header-cta">List Your Profile</a>
  </div>
</header>

<main id="main-content">
  <section class="hero">
    <div class="container">
      <h1>Dubai's Verified Real Estate Agents</h1>
      <p class="hero-sub">Browse profiles, view listings, and connect directly.</p>
      <div id="agent-count-badge" class="agent-count" aria-live="polite" aria-atomic="true"></div>

      <div class="search-wrap" role="search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          id="search-input"
          placeholder="Search by name or agency…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Search agents by name or agency"
        >
      </div>

      <div class="filter-chips" role="group" aria-label="Filter agents">
        <button class="chip active" data-filter="all">All Agents</button>
        <button class="chip" data-filter="dld">
          <span class="chip-dot chip-dot-verified" aria-hidden="true"></span>
          DLD Verified
        </button>
        <button class="chip" data-filter="pro">
          <span class="chip-dot chip-dot-pro" aria-hidden="true"></span>
          Pro
        </button>
        <button class="chip" data-filter="premium">
          <span class="chip-dot chip-dot-premium" aria-hidden="true"></span>
          Premium
        </button>
      </div>
    </div>
  </section>

  <section class="listing-section" aria-label="Agent listings">
    <div class="container">
      <div class="results-bar">
        <span id="results-count" class="results-count" aria-live="polite" aria-atomic="true"></span>
      </div>
      <div id="agent-grid" class="agent-grid" role="list" aria-label="Agent profiles">
        <!-- Skeleton cards rendered by JS until data loads -->
        <div class="skeleton-card" aria-hidden="true">
          <div class="skel skel-avatar"></div>
          <div class="skel skel-line" style="width:70%"></div>
          <div class="skel skel-line-sm" style="width:50%"></div>
          <div class="skel skel-btn"></div>
        </div>
        <div class="skeleton-card" aria-hidden="true">
          <div class="skel skel-avatar"></div>
          <div class="skel skel-line" style="width:65%"></div>
          <div class="skel skel-line-sm" style="width:55%"></div>
          <div class="skel skel-btn"></div>
        </div>
        <div class="skeleton-card" aria-hidden="true">
          <div class="skel skel-avatar"></div>
          <div class="skel skel-line" style="width:72%"></div>
          <div class="skel skel-line-sm" style="width:48%"></div>
          <div class="skel skel-btn"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">

  </div>
</footer>

</body>
</html>
