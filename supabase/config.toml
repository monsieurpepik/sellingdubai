# supabase/config.toml
# Local development configuration for the Supabase emulator.
#
# FIRST-TIME SETUP:
#   1. brew install supabase/tap/supabase
#   2. supabase login
#   3. supabase link --project-ref pjyorgedaxevxophpfib
#   4. supabase db pull          # pull prod schema into supabase/migrations/
#   5. bash scripts/dev.sh       # start local stack + serve edge functions

[api]
  enabled = true
  port = 54321
  schemas = ["public", "graphql_public"]
  extra_search_path = ["public", "extensions"]
  max_rows = 1000

[api.tls]
  enabled = false

[db]
  port = 54322
  shadow_port = 54320
  major_version = 15

[db.pooler]
  enabled = false
  port = 54329
  pool_mode = "transaction"
  default_pool_size = 20
  max_client_conn = 100

[realtime]
  enabled = true
  ip_version = "IPv6"
  max_header_length = 4096

[studio]
  enabled = true
  port = 54323
  api_url = "http://127.0.0.1"

[inbucket]
  # Local email sink — all outbound emails captured here instead of Resend
  # View at: http://127.0.0.1:54324
  enabled = true
  port = 54324
  smtp_port = 54325
  pop3_port = 54326

[storage]
  enabled = true
  file_size_limit = "50MiB"

[storage.image_transformation]
  enabled = true

[auth]
  enabled = true
  site_url = "http://127.0.0.1:8888"
  additional_redirect_urls = [
    "http://127.0.0.1:8888",
    "http://127.0.0.1:8888/edit",
    "http://localhost:8888",
    "http://localhost:8888/edit",
  ]
  jwt_expiry = 3600
  enable_refresh_token_rotation = true
  refresh_token_reuse_interval = 10
  enable_signup = true
  enable_anonymous_sign_ins = false
  enable_manual_linking = false
  minimum_password_length = 8

[auth.email]
  enable_signup = true
  double_confirm_changes = true
  enable_confirmations = false

[auth.sms]
  enable_signup = false

[edge_runtime]
  enabled = true
  policy = "per_worker"
  inspector_port = 8083

[analytics]
  enabled = false
  port = 54327
  backend = "postgres"

# Public-facing functions called before a user has a session token.
# verify_jwt = false disables Supabase's platform-level JWT gate so
# unauthenticated browsers can reach these endpoints. Each function
# implements its own auth/rate-limiting internally.
[functions.send-magic-link]
verify_jwt = false

[functions.verify-magic-link]
verify_jwt = false

[functions.capture-lead-v4]
verify_jwt = false

[functions.send-otp]
verify_jwt = false

[functions.verify-broker]
verify_jwt = false
